apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-app-backend-ingress
  namespace: project
spec:
  rules:
    - http:
        paths:
          - path: /todos
            pathType: Prefix
            backend:
              service:
                name: todo-app-backend-service
                port:
                  number: 2345
