apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-app-frontend-ingress
  namespace: project
spec:
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todo-app-frontend-service
                port:
                  number: 1234
